<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mobile Vision Senhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos omitidos para brevidade... */
    </style>
</head>
<body class="min-h-screen">
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold mb-4">Login</h2>
            <input type="password" id="loginPassword" placeholder="Digite a senha" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4">
            <button id="loginBtn" class="bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700">Entrar</button>
            <button id="cancelLoginBtn" class="ml-2 bg-gray-500 text-white py-2 px-4 rounded-lg hover:bg-gray-600">Cancelar</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
        <div class="flex items-center">
            <div class="bg-indigo-600 text-white p-2 rounded-lg mr-3">
                <i class="fas fa-ticket-alt text-xl"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-900">Mobile Vision Senhas</h1>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2">
                <i class="fas fa-user text-indigo-600"></i>
                <span id="currentUserDisplay" class="text-gray-700 font-medium">Atendente</span>
            </div>
            <span id="currentTime" class="text-gray-600 font-medium"></span>
        </div>
    </div>

    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex overflow-x-auto">
                <button data-tab="admin" class="tab-button px-4 py-3 text-sm font-medium text-gray-500 hover:text-indigo-600 whitespace-nowrap border-b-2 border-transparent hover:border-indigo-300">
                    <i class="fas fa-cog mr-2"></i> Administração
                </button>
                <button data-tab="atendente" class="tab-button px-4 py-3 text-sm font-medium text-gray-500 hover:text-indigo-600 whitespace-nowrap border-b-2 border-transparent hover:border-indigo-300">
                    <i class="fas fa-user-tie mr-2"></i> Atendente
                </button>
                <button data-tab="emissor" class="tab-button px-4 py-3 text-sm font-medium text-gray-500 hover:text-indigo-600 whitespace-nowrap border-b-2 border-transparent hover:border-indigo-300">
                    <i class="fas fa-tablet-alt mr-2"></i> Emissor de Senhas
                </button>
                <button data-tab="cliente" class="tab-button px-4 py-3 text-sm font-medium text-gray-500 hover:text-indigo-600 whitespace-nowrap border-b-2 border-transparent hover:border-indigo-300">
                    <i class="fas fa-tv mr-2"></i> Visualização Cliente
                </button>
            </nav>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
        <div id="admin" class="tab-content hidden">
            <!-- Conteúdo da aba Admin -->
        </div>

        <div id="atendente" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="bg-white shadow rounded-lg p-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-6 flex items-center">
                            <i class="fas fa-user-tie text-indigo-600 mr-2"></i> Painel do Atendente
                        </h2>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <h3 class="text-lg font-medium text-gray-700 mb-3">Chamar Próxima Senha</h3>
                                <div class="space-y-4">

                                    <button id="callNormalBtn" class="btn-senha w-full bg-indigo-600 text-white py-4 px-6 rounded-lg text-xl font-bold hover:bg-indigo-700">
                                        <i class="fas fa-ticket-alt mr-3"></i> Chamar Normal
                                    </button>

                                    <button id="callPreferentialBtn" class="btn-senha w-full bg-emerald-600 text-white py-4 px-6 rounded-lg text-xl font-bold hover:bg-emerald-700">
                                        <i class="fas fa-heart mr-3"></i> Chamar Preferencial
                                    </button>

                                    <button id="callAgainBtn" class="btn-senha w-full bg-amber-500 text-white py-4 px-6 rounded-lg text-xl font-bold hover:bg-amber-600">
                                        <i class="fas fa-redo mr-3"></i> Chamar Novamente
                                    </button>

                                    <button id="resetTicketsAtendenteBtn" class="mt-2 w-full bg-red-500 text-white py-2 px-4 rounded-lg hover:bg-red-600">
                                        <i class="fas fa-eraser mr-2"></i> Zerar Senhas
                                    </button>
                                </div>
                            </div>

                            <div>
                                <h3 class="text-lg font-medium text-gray-700 mb-3">Senha Atual</h3>
                                <div class="bg-gray-100 p-6 rounded-lg flex flex-col items-center justify-center h-full">
                                    <div id="currentTicketDisplay" class="senha-display mb-4">---</div>
                                    <div id="currentTicketTime" class="text-gray-600 text-sm">--:--:--</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="bg-white shadow rounded-lg p-6 h-full">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                            <i class="fas fa-list-ol text-indigo-600 mr-2"></i> Fila de Espera
                        </h2>

                        <div class="space-y-3">
                            <div class="bg-indigo-50 p-4 rounded-lg">
                                <h3 class="font-medium text-indigo-800 mb-2">Senhas Normais</h3>
                                <div id="normalQueue" class="space-y-2"></div>
                            </div>

                            <div class="bg-emerald-50 p-4 rounded-lg">
                                <h3 class="font-medium text-emerald-800 mb-2">Senhas Preferenciais</h3>
                                <div id="preferentialQueue" class="space-y-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="emissor" class="tab-content hidden">
            <div class="bg-white shadow rounded-lg p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-6 flex items-center">
                    <i class="fas fa-tablet-alt text-indigo-600 mr-2"></i> Emissor de Senhas
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="flex flex-col items-center justify-center">
                        <button id="emitNormalBtn" class="btn-senha w-full max-w-xs bg-indigo-600 text-white py-12 px-6 rounded-xl text-3xl font-bold hover:bg-indigo-700 transition duration-300">
                            <i class="fas fa-ticket-alt text-4xl mb-2"></i>
                            <span>Normal</span>
                        </button>
                        <div id="lastNormalTicket" class="text-gray-600 text-lg">Última: N-000</div>
                    </div>
                    <div class="flex flex-col items-center justify-center">
                        <button id="emitPreferentialBtn" 
                                class="btn-senha w-full max-w-xs bg-emerald-600 text-white py-12 px-6 rounded-xl text-3xl font-bold hover:bg-emerald-700 transition duration-300">
                            <i class="fas fa-heart text-4xl mb-2"></i>
                            <span>Preferencial</span>
                        </button>
                        <div id="lastPreferentialTicket" class="text-gray-600 text-lg">Última: P-000</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="cliente" class="tab-content hidden">
            <div class="h-screen bg-black text-white flex overflow-hidden">
                <!-- Lado Esquerdo: Vídeo -->
                <div class="flex-1 flex flex-col">
                    <div class="flex-1 relative bg-gray-900">
                        <div class="video-container absolute inset-0">
                            <iframe id="clientVideo" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>
                </div>

                <!-- Lado Direito: Senha -->
                <div class="w-1/3 bg-gray-900 border-l border-gray-700 flex flex-col p-8 justify-center items-center">
                    <div class="text-center">
                        <div class="text-lg font-bold text-gray-300 mb-2">SENHA ATUAL</div>
                        <div id="clientCurrentTicket" class="text-7xl font-bold text-yellow-400 mb-4">---</div>
                        <div id="clientCurrentTicketTime" class="text-sm text-gray-400 mb-6">--:--:--</div>
                        <hr class="border-gray-600 my-6">
                        <div class="text-sm font-bold text-gray-300 mb-4">PRÓXIMAS SENHAS</div>
                        <div id="clientNextTickets" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // JavaScript para gerenciamento das senhas e funcionalidades
        let normalTickets = [];
        let preferentialTickets = [];
        let calledTickets = [];
        let currentTicket = null;

        function updateQueues() {
            const normalQueue = document.getElementById('normalQueue');
            const preferentialQueue = document.getElementById('preferentialQueue');
            normalQueue.innerHTML = '';
            preferentialQueue.innerHTML = '';
            
            normalTickets.forEach(ticket => {
                const div = document.createElement('div');
                div.textContent = ticket;
                normalQueue.appendChild(div);
            });

            preferentialTickets.forEach(ticket => {
                const div = document.createElement('div');
                div.textContent = ticket;
                preferentialQueue.appendChild(div);
            });
        }

        document.getElementById('emitNormalBtn').addEventListener('click', function() {
            normalTickets.push('N-' + (normalTickets.length + 1));
            updateQueues();
            document.getElementById('lastNormalTicket').textContent = 'Última: N-' + normalTickets.length;
        });

        document.getElementById('emitPreferentialBtn').addEventListener('click', function() {
            preferentialTickets.push('P-' + (preferentialTickets.length + 1));
            updateQueues();
            document.getElementById('lastPreferentialTicket').textContent = 'Última: P-' + preferentialTickets.length;
        });

        document.getElementById('callNormalBtn').addEventListener('click', function() {
            if (normalTickets.length) {
                currentTicket = normalTickets.shift();
                calledTickets.push(currentTicket);
                updateQueues();
                document.getElementById('currentTicketDisplay').textContent = currentTicket;
            }
        });

        document.getElementById('callPreferentialBtn').addEventListener('click', function() {
            if (preferentialTickets.length) {
                currentTicket = preferentialTickets.shift();
                calledTickets.push(currentTicket);
                updateQueues();
                document.getElementById('currentTicketDisplay').textContent = currentTicket;
            }
        });

        document.getElementById('callAgainBtn').addEventListener('click', function() {
            if (calledTickets.length) {
                const ticket = calledTickets[calledTickets.length - 1];
                currentTicket = ticket;
                document.getElementById('currentTicketDisplay').textContent = currentTicket;
            }
        });

        // Função para alternar entre as abas
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
                document.getElementById(this.getAttribute('data-tab')).classList.remove('hidden');
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
